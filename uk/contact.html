<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакт — DK Software Studio</title>

<style>

:root{
--blue:#1A53AD;
--blueDark:#163e82;
--bg:#f4f6f9;
--text:#2c3e50;
--muted:#666;
--card:#ffffff;
--border:rgba(0,0,0,0.06);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
-webkit-text-size-adjust:100%;
}

.topbar{
max-width:980px;
margin:0 auto;
padding:18px 20px 0;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:inherit;
}

.brand img{
width:40px;
}

.brand .name{
font-weight:700;
letter-spacing:0.2px;
white-space:nowrap;
color:var(--text);
}

.nav{
display:flex;
gap:16px;
align-items:center;
flex-wrap:wrap;
}

.nav a{
color:var(--text);
text-decoration:none;
font-weight:600;
font-size:14px;
}

.nav a:hover{
color:var(--blue);
}

.wrap{
max-width:980px;
margin:0 auto;
padding:24px 20px 70px;
}

.hero{
margin-top:16px;
display:flex;
justify-content:center;
}

.card{
width:100%;
max-width:860px;
background:var(--card);
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border:1px solid var(--border);
padding:44px 42px;
text-align:center;
transition:box-shadow 0.25s ease;
}

.card:hover{
box-shadow:0 16px 40px rgba(0,0,0,0.10);
}

.title{
margin:0 0 10px;
font-size:38px;
font-weight:500;
line-height:1.1;
color:var(--text);
}

.subtitle{
margin:0 auto 18px;
max-width:720px;
font-size:16px;
line-height:1.7;
color:var(--muted);
}

.contact-box{
margin:14px auto 18px;
display:inline-flex;
align-items:center;
gap:10px;
padding:12px 16px;
border-radius:12px;
background:#eef2f8;
border:1px solid var(--border);
color:var(--text);
font-weight:700;
}

.contact-box svg{
width:18px;
height:18px;
fill:var(--blue);
}

.contact-box a{
color:inherit;
text-decoration:none;
}

.contact-box a:hover{
color:var(--blue);
}

.social{
margin-top:18px;
}

.social a{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:12px;
background:#ffffff;
border:1px solid rgba(26,83,173,0.14);
color:var(--blue);
text-decoration:none;
font-size:14px;
font-weight:700;
transition:all 0.2s ease;
box-shadow:0 6px 18px rgba(0,0,0,0.03);
}

.social a:hover{
color:var(--blueDark);
border-color:rgba(26,83,173,0.24);
background:#f8fbff;
transform:translateY(-1px);
}

.linkedin-icon{
width:22px;
height:22px;
border-radius:6px;
background:#0A66C2;
display:inline-flex;
align-items:center;
justify-content:center;
flex:0 0 22px;
}

.linkedin-icon svg{
width:12px;
height:12px;
fill:#ffffff;
display:block;
}

.btn-row{
margin-top:22px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
display:inline-block;
padding:13px 28px;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:700;
transition:transform 0.15s ease, box-shadow 0.15s ease;
border:0;
cursor:pointer;
}

.btn.primary{
background:var(--blue);
color:#fff;
box-shadow:0 10px 25px rgba(26,83,173,0.22);
}

.btn.primary:hover{
background:var(--blueDark);
transform:translateY(-2px);
}

.btn.secondary{
background:#eef2f8;
color:var(--blue);
}

.btn.secondary:hover{
background:#e3eaf6;
transform:translateY(-2px);
}

.btn:active{
transform:scale(0.97);
}

footer{
margin-top:26px;
text-align:center;
color:#9aa6b2;
font-size:13px;
}

@media (max-width:560px){

.topbar{
justify-content:center;
flex-wrap:wrap;
text-align:center;
}

.brand{
width:100%;
justify-content:center;
}

.nav{
width:100%;
justify-content:center;
gap:14px;
}

.brand .name{
white-space:normal;
}

.card{
padding:34px 22px;
}

.title{
font-size:30px;
}

.social a{
max-width:100%;
justify-content:center;
text-align:center;
}

}

</style>
</head>
